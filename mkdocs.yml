site_name: InkGen Documentation
site_description: Procedural SVG drawing toolkit for technical schematics and synthetic data workflows.
repo_url: https://github.com/<your-org>/InkGen
edit_uri: ""

nav:
  - Overview: index.md
  - Getting Started: getting-started.md
  - Components:
      - Drawing Components: components/drawing-components.md
      - Document Structure: components/document-structure.md
  - Text & Layout: text-and-layout.md
  - Examples: examples.md
  - PDF Generation: pdf-generation.md
  - Extraction Truth: extraction-truth.md
  - Definition of Done: Definition_of_Done.md
  - Dependency Map: dependency-map.md
  - Architecture Decisions:
      - ADR-0001 PDF Grammar Truth: adr/0001-pdf-grammar-truth-annotations.md
      - ADR-0002 Closed PDF Renderer: adr/0002-closed-pdf-renderer-domain.md
  - Proof Notes:
      - Grammar Truth: proofs/grammar-truth.md
      - Quadratic Bezier Renderer Contract: proofs/quadratic-bezier-renderer-contract.md
      - Arc Renderer Contract: proofs/arc-renderer-contract.md
      - Cubic Bezier Renderer Contract: proofs/cubic-bezier-renderer-contract.md
      - Regular Polygon Renderer Contract: proofs/regular-polygon-renderer-contract.md
  - Architecture Diagrams: architecture-diagrams.md
  - Notes:
      - Mask Alignment Findings: mask_alignment_findings.md
  - API Reference: api-reference.md

theme:
  name: mkdocs
  highlightjs: true

markdown_extensions:
  - admonition
  - codehilite
  - tables
  - toc:
      permalink: true
