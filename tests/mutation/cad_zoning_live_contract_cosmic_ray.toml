[cosmic-ray]
module-path = [
  "src/InkGen/cad_component_groups.py",
]
timeout = 120.0
excluded-modules = []
test-command = "env PYTHONPATH=src /home/ubuntu/.cache/inkgen_mutation_venv/bin/python -m pytest -x tests/test_cad_zoning_contract.py -k 'test_legacy_zoning_emits_only_svg_components or test_legacy_zoning_rejects_invalid_boundary_parameters or test_legacy_zoning_round_trips_parameters_with_style_registry'"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.execution-engine]
name = "local"

[cosmic-ray.cloning]
method = "copy"

[cosmic-ray.filters.operators-filter]
exclude-operators = [
  "core/ReplaceBinaryOperator_BitOr_UnChecked",
  "core/ReplaceBinaryOperator_BitOr_Checked",
]
