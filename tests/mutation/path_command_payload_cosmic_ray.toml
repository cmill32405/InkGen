[cosmic-ray]
module-path = [
  "src/InkGen/component.py",
]
timeout = 120.0
excluded-modules = []
test-command = "env PYTHONPATH=src /home/ubuntu/.cache/inkgen_mutation_venv/bin/python -m pytest -x tests/test_path_contract.py -k 'path_preserves_valid_command_dictionary_payloads or path_factory_rejects_malformed_command_payloads or path_add_command_rejects_malformed_command_dictionaries'"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.filters.operators-filter]
exclude-operators = []
