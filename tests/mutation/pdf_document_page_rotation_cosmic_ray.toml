[cosmic-ray]
module-path = [
  "src/InkGen/pdf_generator.py",
]
timeout = 90.0
excluded-modules = []
test-command = "/home/ubuntu/.cache/inkgen_mutation_venv/bin/python -m pytest -x tests/test_pdf_document_contract.py tests/test_pdf_document_factory_payload_contract.py tests/test_pdf_generator.py"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.execution-engine]
name = "local"

[cosmic-ray.cloning]
method = "copy"

[cosmic-ray.filters.operators-filter]
exclude-operators = []
