[cosmic-ray]
module-path = [
  "src/InkGen/svg_generator.py",
]
timeout = 120.0
excluded-modules = []
test-command = "env PYTHONPATH=src /home/ubuntu/.cache/inkgen_mutation_venv/bin/python -m pytest -x tests/test_path_contract.py -k 'path_svg_factory_preserves_valid_command_payloads_and_flags or path_svg_factory_rejects_malformed_payload_roots or path_svg_factory_rejects_malformed_command_payloads'"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.filters.operators-filter]
exclude-operators = []
