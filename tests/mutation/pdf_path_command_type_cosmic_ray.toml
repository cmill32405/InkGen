[cosmic-ray]
module-path = [
  "src/InkGen/pdf_generator.py",
]
timeout = 120.0
excluded-modules = []
test-command = "env PYTHONPATH=src /home/ubuntu/.cache/inkgen_mutation_venv/bin/python -m pytest -x tests/test_pdf_component_factory_payload_contract.py -k 'path_pdf_factory_rejects_malformed_command_payloads or pdf_component_factories_preserve_explicit_style_compact_payloads'"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.filters.operators-filter]
exclude-operators = []
