[cosmic-ray]
module-path = [
  "src/InkGen/component.py",
  "src/InkGen/pdf_generator.py",
  "src/InkGen/dxf_generator.py",
]
timeout = 20.0
excluded-modules = []
test-command = "python -m pytest -x tests/test_curve_contract.py tests/test_component.py tests/test_pdf_generator.py tests/test_dxf_generator.py"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.filters.operators-filter]
exclude-operators = []
