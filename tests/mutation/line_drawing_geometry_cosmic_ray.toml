[cosmic-ray]
module-path = [
  "src/InkGen/drawing_components.py",
]
timeout = 120.0
excluded-modules = []
test-command = "env PYTHONPATH=src /home/ubuntu/.cache/inkgen_mutation_venv/bin/python -m pytest -x tests/test_line_contract.py tests/test_flow_document_contract.py tests/test_document_outputs.py tests/test_dxf_generator.py"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.filters.operators-filter]
exclude-operators = []
