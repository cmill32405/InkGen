[cosmic-ray]
module-path = [
  "src/InkGen/pdf_generator.py",
]
timeout = 60.0
excluded-modules = []
test-command = "python -m pytest -x tests/test_pdf_generator.py"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.execution-engine]
name = "local"

[cosmic-ray.cloning]
method = "copy"

[cosmic-ray.filters.operators-filter]
exclude-operators = []
