[cosmic-ray]
module-path = [
  "src/InkGen/pdf_generator.py",
]
timeout = 20.0
excluded-modules = []
test-command = "python -m pytest -x tests/test_pdf_generator.py tests/test_text_contract.py::test_text_pdf_emits_exact_text_object_and_escapes_string tests/test_text_contract.py::test_text_pdf_uses_black_and_ten_point_defensive_defaults"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.filters.operators-filter]
exclude-operators = []
