[cosmic-ray]
module-path = [
  "src/InkGen/paragraph.py",
  "src/InkGen/drawing_components.py",
  "src/InkGen/document_outputs.py",
]
timeout = 120.0
excluded-modules = []
test-command = "env PYTHONPATH=src /home/ubuntu/.cache/inkgen_mutation_venv/bin/python -m pytest -x tests/test_paragraph_contract.py"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.execution-engine]
name = "local"

[cosmic-ray.cloning]
method = "copy"

[cosmic-ray.filters.operators-filter]
exclude-operators = [
  "core/ReplaceBinaryOperator_BitOr_UnChecked",
  "core/ReplaceBinaryOperator_BitOr_Checked",
]
