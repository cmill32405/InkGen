[cosmic-ray]
module-path = [
  "src/InkGen/drawing_components.py",
]
timeout = 90.0
excluded-modules = []
test-command = "python -m pytest -x tests/test_drawing_group_contract.py tests/test_drawing_components.py"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.execution-engine]
name = "local"

[cosmic-ray.cloning]
method = "copy"

[cosmic-ray.filters.operators-filter]
exclude-operators = [
  "core/ReplaceBinaryOperator_BitOr_UnChecked",
  "core/ReplaceBinaryOperator_BitOr_Checked",
]
