[cosmic-ray]
module-path = [
  "src/InkGen/drawing_components.py",
]
timeout = 120.0
excluded-modules = []
test-command = "env PYTHONPATH=src /home/ubuntu/.cache/inkgen_mutation_venv/bin/python -m pytest -x tests/test_drawing_components.py -k 'zoning_drawing_label_range_validator_partitions or zoning_drawing_rejects_label_sequences_that_leave_ascii_ranges or zoning_drawing_hydration_rejects_label_ranges_that_leave_ascii_ranges'"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.filters.operators-filter]
exclude-operators = []
