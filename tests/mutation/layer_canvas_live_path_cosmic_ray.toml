[cosmic-ray]
module-path = [
  "src/InkGen/document.py",
]
timeout = 90.0
excluded-modules = []
test-command = "env PYTHONPATH=src /home/ubuntu/.cache/inkgen_mutation_venv/bin/python -m pytest -x tests/test_boundary_canvas_contract.py tests/test_document.py"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.filters.operators-filter]
exclude-operators = []
