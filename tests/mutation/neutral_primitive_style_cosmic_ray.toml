[cosmic-ray]
module-path = ["src/InkGen/drawing_components.py"]
timeout = 120.0
excluded-modules = []
test-command = "python -m pytest -x tests/test_neutral_primitive_style_contract.py tests/test_drawing_components.py tests/test_drawing_group_contract.py tests/test_document_outputs.py tests/test_flow_document_contract.py tests/test_dxf_generator.py"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.execution-engine]
name = "local"

[cosmic-ray.cloning]
method = "copy"

[cosmic-ray.filters.operators-filter]
exclude-operators = [
  "core/ReplaceBinaryOperator_BitOr_UnChecked",
  "core/ReplaceBinaryOperator_BitOr_Checked",
]
