[cosmic-ray]
module-path = [
  "src/InkGen/svg_generator.py",
  "src/InkGen/pdf_generator.py",
  "src/InkGen/dxf_generator.py",
  "src/InkGen/document_outputs.py",
]
timeout = 120.0
excluded-modules = []
test-command = "env PYTHONPATH=src /home/ubuntu/.cache/inkgen_mutation_venv/bin/python -m pytest -x tests/test_font_contract.py tests/test_text_style_contract.py tests/test_svg_generator.py tests/test_pdf_generator.py tests/test_dxf_generator.py tests/test_document_outputs.py"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.execution-engine]
name = "local"

[cosmic-ray.cloning]
method = "copy"

[cosmic-ray.filters.operators-filter]
exclude-operators = [
  "core/ReplaceBinaryOperator_BitOr_UnChecked",
  "core/ReplaceBinaryOperator_BitOr_Checked",
]
