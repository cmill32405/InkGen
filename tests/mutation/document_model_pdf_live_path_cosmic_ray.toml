[cosmic-ray]
module-path = [
  "src/InkGen/pdf_generator.py",
]
timeout = 90.0
excluded-modules = []
test-command = "env PYTHONPATH=src /home/ubuntu/.cache/inkgen_mutation_venv/bin/python -m pytest -x tests/test_document_model_contract.py tests/test_pdf_generator.py"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.filters.operators-filter]
exclude-operators = []
