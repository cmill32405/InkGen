[cosmic-ray]
module-path = [
  "src/InkGen/style.py",
  "src/InkGen/svg_generator.py",
  "src/InkGen/pdf_generator.py",
]
timeout = 90.0
excluded-modules = []
test-command = "python -m pytest -x tests/test_drawing_style_contract.py tests/test_style.py tests/test_svg_generator.py tests/test_pdf_generator.py"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.execution-engine]
name = "local"

[cosmic-ray.cloning]
method = "copy"

[cosmic-ray.filters.operators-filter]
exclude-operators = []
