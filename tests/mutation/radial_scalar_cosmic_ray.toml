[cosmic-ray]
module-path = [
  "src/InkGen/component.py",
  "src/InkGen/svg_generator.py",
  "src/InkGen/pdf_generator.py",
]
timeout = 90.0
excluded-modules = []
test-command = "env PYTHONPATH=src /home/ubuntu/.cache/inkgen_mutation_venv/bin/python -m pytest -x tests/test_radial_scalar_contract.py tests/test_circle_contract.py tests/test_regular_polygon_contract.py"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.filters.operators-filter]
exclude-operators = []
