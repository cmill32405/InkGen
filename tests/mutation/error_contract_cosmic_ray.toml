[cosmic-ray]
module-path = [
  "src/InkGen/errors.py",
  "src/InkGen/__init__.py",
]
timeout = 90.0
excluded-modules = []
test-command = "env PYTHONPATH=src /home/ubuntu/.cache/inkgen_mutation_venv/bin/python -m pytest -x tests/test_error_contract.py"

[cosmic-ray.distributor]
name = "local"

[cosmic-ray.filters.operators-filter]
exclude-operators = []
